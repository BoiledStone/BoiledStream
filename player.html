<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BoiledStream - Player</title>
    <meta name="description" content="Player video BoiledStream.">
    <link rel="stylesheet" href="styles.css">
    <script src="scripts/videos.js" defer></script>
    <script src="scripts/player.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Accueil BoiledStream">
        <span class="brand-mark" aria-hidden="true">B</span>
        <span>BoiledStream</span>
      </a>
      <nav class="top-nav" aria-label="Navigation principale">
        <a href="index.html#catalogue">Catalogue</a>
        <a href="index.html#sources">Sources</a>
      </nav>
    </header>

    <main>
      <section class="player-layout" aria-labelledby="player-title">
        <div class="player-stage">
          <a class="back-link" href="index.html#catalogue">Retour au catalogue</a>
          <div id="player-mount" class="player-mount" aria-label="Lecteur video"></div>
        </div>

        <aside class="player-details" aria-label="Informations video">
          <p class="section-kicker" id="player-category"></p>
          <h1 id="player-title"></h1>
          <p id="player-description"></p>
          <dl class="meta-list">
            <div>
              <dt>Duree</dt>
              <dd id="player-duration"></dd>
            </div>
            <div>
              <dt>Qualite</dt>
              <dd id="player-quality"></dd>
            </div>
            <div>
              <dt>Source</dt>
              <dd><a id="player-source" href="#" target="_blank" rel="noreferrer"></a></dd>
            </div>
          </dl>
          <div class="tag-row" id="player-tags"></div>
          <div class="player-actions" id="player-actions">
            <a class="button secondary" id="previous-link" href="#">Precedente</a>
            <a class="button primary" id="next-link" href="#">Suivante</a>
          </div>
        </aside>
      </section>

      <section class="related-section" aria-labelledby="related-title">
        <div class="section-heading">
          <div>
            <p class="section-kicker">Continuer</p>
            <h2 id="related-title">Autres videos</h2>
          </div>
        </div>
        <div class="video-grid compact" id="related-grid"></div>
      </section>
    </main>

    <footer class="site-footer" id="sources">
      <p>
        Les videos sont referencees depuis leurs hebergeurs externes et affichees dans une page player interne.
      </p>
    </footer>
  </body>
</html>
