name: Generate Discord previews

on:
  push:
    branches:
      - main
      - gh-pages
    paths:
      - "index.html"
      - "player.html"
      - "scripts/**"
      - "miniatures/**"
      - "!watch/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate watch pages
        run: node scripts/generate-watch-pages.js

      - name: Commit generated pages
        run: |
          if [ -n "$(git status --porcelain watch)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add watch
            git commit -m "Generate Discord preview pages"
            git push
          fi
